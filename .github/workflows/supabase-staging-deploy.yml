name: Supabase Staging Deploy

on:
  workflow_dispatch:
    inputs:
      apply_db:
        description: "Aplicar migraciones a staging"
        required: true
        type: boolean
        default: true
      deploy_functions:
        description: "Desplegar Edge Functions"
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
      DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF_STAGING" && exit 1)
          test -n "$DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD_STAGING" && exit 1)

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF" --password "$DB_PASSWORD"

      - name: Apply database migrations
        if: ${{ inputs.apply_db }}
        run: supabase db push

      - name: Push function secrets
        if: ${{ inputs.deploy_functions }}
        env:
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL_STAGING }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          EMAIL_WEBHOOK_SECRET: ${{ secrets.EMAIL_WEBHOOK_SECRET }}
          WEEKLY_SUMMARY_SCHEDULER_SECRET: ${{ secrets.WEEKLY_SUMMARY_SCHEDULER_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_STAGING }}
        run: |
          supabase secrets set \
            OWNER_EMAIL="$OWNER_EMAIL" \
            APP_PUBLIC_URL="$APP_PUBLIC_URL" \
            RESEND_API_KEY="$RESEND_API_KEY" \
            RESEND_FROM_EMAIL="$RESEND_FROM_EMAIL" \
            EMAIL_WEBHOOK_SECRET="$EMAIL_WEBHOOK_SECRET" \
            WEEKLY_SUMMARY_SCHEDULER_SECRET="$WEEKLY_SUMMARY_SCHEDULER_SECRET" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"

      - name: Deploy edge functions
        if: ${{ inputs.deploy_functions }}
        run: |
          supabase functions deploy user-admin
          supabase functions deploy mailer
          supabase functions deploy email-inbound
          supabase functions deploy send-quote-email
          supabase functions deploy weekly-quote-summary --no-verify-jwt
